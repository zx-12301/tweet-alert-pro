version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: tweetalert
      POSTGRES_USER: tweetalert
      POSTGRES_PASSWORD: tweetalert123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
